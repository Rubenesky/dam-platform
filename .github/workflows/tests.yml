name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install PHP extensions
        run: sudo apt-get install -y php-sqlite3 php-xml php-mbstring php-curl

      - name: Install dependencies
        run: composer install --no-scripts --no-interaction --prefer-dist

      - name: Setup environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run tests
        run: php artisan test tests/Feature/Auth tests/Feature/Authorization tests/Feature/Assets
